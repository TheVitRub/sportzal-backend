name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check deploy credentials
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          if [ -z "$SERVER_SSH_KEY" ] && [ -z "$SERVER_PASSWORD" ]; then
            echo "Add SERVER_SSH_KEY or SERVER_PASSWORD to repository secrets."
            exit 1
          fi

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST || '135.106.139.12' }}
          username: ${{ secrets.SERVER_USER || 'tvr' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            cd /home/tvr/sportzal/backend
            git fetch origin main
            git reset --hard origin/main

            cd /home/tvr/fencing
            docker compose up -d --build --no-deps sport-backend
            docker compose ps sport-backend

            curl -fsS http://127.0.0.1/sport/api/v1/categories >/dev/null
