name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sportzal-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/tvr/sportzal/backend
            git fetch --prune origin main
            git reset --hard origin/main
            ./deploy.sh
