name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 135.106.139.12
          username: tvr
          port: 2222
          key: ${{ secrets.SSH_KEY_SERVER }}
          script: |
            set -e

            cd /home/tvr/sportzal/backend
            git fetch origin main
            git reset --hard origin/main

            cd /home/tvr/fencing
            docker compose up -d --build --no-deps sport-backend
            docker compose ps sport-backend

            curl -fsS http://127.0.0.1/sport/api/v1/categories >/dev/null
